<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Output Cycle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #c8c8c8;
      background: #2d2d2d;
      padding: 10px;
    }

    h4 {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin: 14px 0 8px;
    }
    h4:first-child { margin-top: 4px; }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .row label { min-width: 80px; color: #a0a0a0; font-size: 12px; }
    input[type="text"] {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 5px 8px;
      font-size: 13px;
    }
    input[type="text"]:focus { outline: none; border-color: #4a90e2; }

    #output-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #output-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #222;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: grab;
      user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }
    #output-list li:active { cursor: grabbing; }
    #output-list li.dragging { opacity: 0.45; border-color: #e27a4a; }
    #output-list li.drag-over { background: #3a2a1a; border-color: #e27a4a; }
    #output-list li.active-output { border-color: #6fcf97; }

    .drag-handle { color: #555; font-size: 14px; line-height: 1; flex-shrink: 0; }
    .output-checkbox { width: 15px; height: 15px; accent-color: #e27a4a; flex-shrink: 0; cursor: pointer; }
    .output-label { flex: 1; font-size: 13px; color: #d0d0d0; }
    #output-list li.active-output .output-label::after { content: " \u25CF"; color: #6fcf97; font-size: 10px; }
    .output-order { font-size: 11px; color: #555; min-width: 18px; text-align: right; }

    .btn-row { display: flex; gap: 6px; margin-top: 10px; }
    .btn { padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn-primary  { background: #e27a4a; color: #fff; }
    .btn-primary:hover  { background: #c9623a; }
    .btn-secondary { background: #3a3a3a; color: #bbb; }
    .btn-secondary:hover { background: #4a4a4a; }

    .status { margin-top: 8px; font-size: 12px; min-height: 16px; color: #888; }
    .status.ok  { color: #6fcf97; }
    .status.err { color: #eb5757; }

    .hint { font-size: 11px; color: #555; margin-top: 6px; line-height: 1.5; }

    hr { border: none; border-top: 1px solid #3a3a3a; margin: 12px 0; }
  </style>
</head>
<body>

<h4 data-i18n="sectionPlayer">WiiM Player</h4>
<div class="row">
  <label for="wiimIP" data-i18n="labelIP">WiiM IP</label>
  <input type="text" id="wiimIP" placeholder="192.168.1.100" spellcheck="false" autocomplete="off"/>
</div>
<div style="display:flex;gap:6px;margin-bottom:4px">
  <button class="btn btn-secondary" id="btnTest" data-i18n="btnTest">Test</button>
</div>
<div class="status" id="connStatus"></div>

<hr>

<h4 data-i18n="sectionOutputs">Cycle Outputs</h4>
<p class="hint" style="margin-bottom:8px" data-i18n="hintOutputs">Check the outputs to include. Drag to reorder.</p>

<ul id="output-list"></ul>

<div class="btn-row">
  <button class="btn btn-primary" id="btnSave" data-i18n="btnSave">Save</button>
</div>
<div class="status" id="saveStatus"></div>

<p class="hint" style="margin-top:10px" data-i18n="hintNote">Not all WiiM models have every output. Only check the outputs your device supports.</p>

<script>
// ─── i18n ────────────────────────────────────────────────────────────────────
const LANG = navigator.language?.startsWith("es") ? "es" : "en";
const STRINGS = {
  en: {
    sectionPlayer: "WiiM Player",
    labelIP: "WiiM IP",
    btnTest: "Test",
    btnSave: "Save",
    sectionOutputs: "Cycle Outputs",
    hintOutputs: "Check the outputs to include. Drag to reorder.",
    hintNote: "Not all WiiM models have every output. Only check the outputs your device supports.",
    testing: "Testing\u2026",
    enterIP: "Enter the IP first",
    enterIPToSave: "Enter the WiiM IP",
    selectOne: "Select at least one output",
    saved: (n) => `\u2705 Saved (${n} output${n === 1 ? "" : "s"} in cycle)`,
  },
  es: {
    sectionPlayer: "Reproductor WiiM",
    labelIP: "IP del WiiM",
    btnTest: "Probar",
    btnSave: "Guardar",
    sectionOutputs: "Salidas del ciclo",
    hintOutputs: "Marca las salidas que quieres incluir. Arrastra para cambiar el orden.",
    hintNote: "No todos los modelos de WiiM tienen todas las salidas. Marca solo las que tenga tu dispositivo.",
    testing: "Probando\u2026",
    enterIP: "Introduce la IP primero",
    enterIPToSave: "Introduce la IP del WiiM",
    selectOne: "Selecciona al menos una salida",
    saved: (n) => `\u2705 Guardado (${n} salida${n === 1 ? "" : "s"} en ciclo)`,
  },
};
const s = (key) => STRINGS[LANG]?.[key] ?? STRINGS.en[key] ?? key;

document.querySelectorAll("[data-i18n]").forEach(el => {
  const key = el.getAttribute("data-i18n");
  const val = s(key);
  if (typeof val === "string") el.textContent = val;
});

// ─── Output catalog ─────────────────────────────────────────────────────────
const ALL_OUTPUTS = [
  { id: "optical", label: "Optical (SPDIF)" },
  { id: "lineout", label: "Line Out"        },
  { id: "coaxial", label: "Coaxial"         },
];

// ─── State ───────────────────────────────────────────────────────────────────
let actionUUID    = "";
let currentOutputId = "";
let rowOrder = ALL_OUTPUTS.map(o => o.id);
let enabled  = new Set(ALL_OUTPUTS.map(o => o.id));

// ─── Stream Deck connection ──────────────────────────────────────────────────
let sdWS;

let actionAction = "";
function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfoRaw) {
  const actionInfo = JSON.parse(actionInfoRaw);
  actionUUID = uuid;
  actionAction = actionInfo.action;

  sdWS = new WebSocket(`ws://127.0.0.1:${port}`);
  sdWS.onopen = () => {
    sdWS.send(JSON.stringify({ event: registerEvent, uuid }));
    sdWS.send(JSON.stringify({ event: "getSettings", context: uuid }));
    sendToPlugin({ event: "getOutputs" });
  };
  sdWS.onmessage = (evt) => {
    const data = JSON.parse(evt.data);
    if (data.event === "didReceiveSettings")       loadSettings(data.payload?.settings ?? {});
    if (data.event === "sendToPropertyInspector")  handlePluginMsg(data.payload);
  };
}

const sendToPlugin = (payload) => {
  if (sdWS?.readyState === WebSocket.OPEN) {
    sdWS.send(JSON.stringify({
      event: "sendToPlugin",
      action: actionAction,
      context: actionUUID,
      payload,
    }));
  }
};

// ─── Load settings ───────────────────────────────────────────────────────────
const loadSettings = (settings) => {
  if (settings.wiimIP) document.getElementById("wiimIP").value = settings.wiimIP;

  if (Array.isArray(settings.enabledOutputs) && settings.enabledOutputs.length > 0) {
    const savedIds  = settings.enabledOutputs;
    const restIds   = ALL_OUTPUTS.map(o => o.id).filter(id => !savedIds.includes(id));
    rowOrder = [...savedIds, ...restIds];
    enabled  = new Set(savedIds);
  }

  renderList();
};

const handlePluginMsg = (payload) => {
  if (payload?.event === "outputCatalog") {
    currentOutputId = payload.currentOutputId ?? "";
    renderList();
  }
  if (payload?.event === "testResult") {
    showStatus("connStatus", payload.message, payload.success ? "ok" : "err");
  }
};

// ─── Render output list ─────────────────────────────────────────────────────
const renderList = () => {
  const ul = document.getElementById("output-list");
  ul.innerHTML = "";

  rowOrder.forEach((id, idx) => {
    const out = ALL_OUTPUTS.find(o => o.id === id);
    if (!out) return;
    const isEnabled = enabled.has(id);
    const isActive  = id === currentOutputId;

    const li = document.createElement("li");
    li.dataset.id = id;
    if (isActive) li.classList.add("active-output");

    li.innerHTML = `
      <span class="drag-handle">\u2807</span>
      <input type="checkbox" class="output-checkbox" ${isEnabled ? "checked" : ""}/>
      <span class="output-label">${out.label}</span>
      <span class="output-order">${isEnabled ? idx + 1 : "\u2013"}</span>
    `;

    li.querySelector(".output-checkbox").addEventListener("change", (e) => {
      if (e.target.checked) enabled.add(id); else enabled.delete(id);
      updateOrderNumbers();
    });

    attachDragHandlers(li);
    ul.appendChild(li);
  });
};

const updateOrderNumbers = () => {
  let n = 1;
  document.querySelectorAll("#output-list li").forEach(li => {
    const chk = li.querySelector(".output-checkbox");
    li.querySelector(".output-order").textContent = (chk?.checked) ? n++ : "\u2013";
  });
};

// ─── Drag & Drop ─────────────────────────────────────────────────────────────
let dragSrc = null;

const attachDragHandlers = (li) => {
  li.setAttribute("draggable", "true");
  li.addEventListener("dragstart", () => { dragSrc = li; setTimeout(() => li.classList.add("dragging"), 0); });
  li.addEventListener("dragend", () => {
    li.classList.remove("dragging");
    document.querySelectorAll("#output-list li").forEach(el => el.classList.remove("drag-over"));
    syncOrderFromDOM();
    dragSrc = null;
  });
  li.addEventListener("dragover", (e) => {
    e.preventDefault();
    if (li === dragSrc) return;
    document.querySelectorAll("#output-list li").forEach(el => el.classList.remove("drag-over"));
    li.classList.add("drag-over");
  });
  li.addEventListener("drop", (e) => {
    e.preventDefault();
    if (li === dragSrc) return;
    const ul = document.getElementById("output-list");
    const items = [...ul.querySelectorAll("li")];
    const fromIdx = items.indexOf(dragSrc);
    const toIdx   = items.indexOf(li);
    if (fromIdx < toIdx) ul.insertBefore(dragSrc, li.nextSibling);
    else                 ul.insertBefore(dragSrc, li);
  });
};

const syncOrderFromDOM = () => {
  rowOrder = [...document.querySelectorAll("#output-list li")].map(li => li.dataset.id);
  updateOrderNumbers();
};

// ─── Save ────────────────────────────────────────────────────────────────────
document.getElementById("btnSave").addEventListener("click", () => {
  syncOrderFromDOM();
  const wiimIP = document.getElementById("wiimIP").value.trim();
  const enabledOutputs = rowOrder.filter(id => enabled.has(id));

  if (!wiimIP) { showStatus("saveStatus", s("enterIPToSave"), "err"); return; }
  if (enabledOutputs.length === 0) { showStatus("saveStatus", s("selectOne"), "err"); return; }

  sendToPlugin({ event: "saveOutputSettings", wiimIP, enabledOutputs });
  showStatus("saveStatus", s("saved")(enabledOutputs.length), "ok");
});

document.getElementById("btnTest").addEventListener("click", () => {
  const wiimIP = document.getElementById("wiimIP").value.trim();
  if (!wiimIP) { showStatus("connStatus", s("enterIP"), "err"); return; }
  showStatus("connStatus", s("testing"), "");
  sendToPlugin({ event: "testConnection", wiimIP });
});

// ─── Utility ─────────────────────────────────────────────────────────────────
const showStatus = (elId, msg, type) => {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.className = "status " + (type ?? "");
  if (type === "ok") setTimeout(() => { el.textContent = ""; el.className = "status"; }, 3000);
};

renderList();
</script>
</body>
</html>
