name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip runs triggered by the version bump commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"

      - name: Skip if no new version
        if: steps.version.outputs.changed == 'false'
        run: echo "No version bump needed" && exit 0

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: "20"

      - name: Stamp version in all files
        if: steps.version.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        working-directory: com.romancin.wiim.sdPlugin
        run: |
          # manifest.json (only the top-level Version field, not Nodejs.Version)
          sed -i "0,/\"Version\": \"[^\"]*\"/{s/\"Version\": \"[^\"]*\"/\"Version\": \"${NEW_VERSION}\"/}" manifest.json
          # plugin.js header and log message
          sed -i "s/Plugin v[0-9]\+\.[0-9]\+\.[0-9]\+/Plugin v${NEW_VERSION}/g" plugin.js
          # package.json + package-lock.json (npm handles both correctly)
          npm version "${NEW_VERSION}" --no-git-tag-version --allow-same-version

      - name: Commit version bump
        if: steps.version.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        working-directory: com.romancin.wiim.sdPlugin
        run: npm ci --production

      - name: Package plugin
        if: steps.version.outputs.changed == 'true'
        run: |
          zip -r com.romancin.wiim.streamDeckPlugin \
            com.romancin.wiim.sdPlugin/ \
            -x "*.DS_Store"

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: com.romancin.wiim.streamDeckPlugin
          generate_release_notes: true
