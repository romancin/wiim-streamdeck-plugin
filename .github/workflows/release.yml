name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"

      - name: Skip if no new version
        if: steps.version.outputs.changed == 'false'
        run: echo "No version bump needed" && exit 0

      - name: Stamp version in plugin files
        if: steps.version.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd com.wiim.streamdeck.sdPlugin
          # manifest.json
          sed -i "s/\"Version\": \"[^\"]*\"/\"Version\": \"${NEW_VERSION}\"/" manifest.json
          # package.json / package-lock.json
          sed -i "0,/\"version\": \"[^\"]*\"/s//\"version\": \"${NEW_VERSION}\"/" package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${NEW_VERSION}\"/g" package-lock.json
          # plugin.js header and log
          sed -i "s/Plugin v[0-9]\+\.[0-9]\+\.[0-9]\+/Plugin v${NEW_VERSION}/g" plugin.js

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        working-directory: com.wiim.streamdeck.sdPlugin
        run: npm ci --production

      - name: Package plugin
        if: steps.version.outputs.changed == 'true'
        run: |
          zip -r com.wiim.streamdeck.streamDeckPlugin \
            com.wiim.streamdeck.sdPlugin/ \
            -x "*.DS_Store"

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: com.wiim.streamdeck.streamDeckPlugin
          generate_release_notes: true
